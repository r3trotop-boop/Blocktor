<!doctype html> 
<html lang="en"> 
<head> 
<meta charset="utf-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Blocktor - Create & Play Safely</title> 
<style> 
:root { 
    --bg-play: #f0f7ff; 
    --card-light: #ffffff; 
    --text-dark: #2c3e50; 
    --text-cool: #7f8c8d; 
    --color-fun: #ff7675; 
    --color-happy: #fdcb6e; 
    --color-safe: #2ecc71; 
    --btn-primary: #6c5ce7;
    --btn-hover: #5b4cc4;
    --border-soft: #dfe6e9;
} 
body { 
    margin: 0; 
    padding: 0; 
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; 
    background-color: var(--bg-play); 
    color: var(--text-dark); 
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
} 

/* LOGIN WINDOW CONTAINER */
.auth-wrapper {
    background: var(--card-light);
    border-radius: 28px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 40px rgba(108, 92, 231, 0.15);
    border: 5px solid #ffffff;
    text-align: center;
    box-sizing: border-box;
}

.auth-title {
    font-size: 38px;
    font-weight: 900;
    color: var(--btn-primary);
    margin: 0 0 6px 0;
    letter-spacing: -1px;
}
.auth-subtitle {
    color: var(--text-cool);
    font-size: 14px;
    margin-bottom: 25px;
    font-weight: 500;
}
.auth-tabs {
    display: flex;
    background: var(--bg-play);
    padding: 6px;
    border-radius: 14px;
    margin-bottom: 25px;
    gap: 4px;
}
.auth-tab-btn {
    flex: 1;
    background: transparent;
    border: none;
    padding: 12px;
    font-weight: 800;
    cursor: pointer;
    border-radius: 10px;
    color: var(--text-cool);
    font-size: 14px;
}
.auth-tab-btn.active {
    background: #ffffff;
    color: var(--btn-primary);
    box-shadow: 0 6px 14px rgba(108, 92, 231, 0.1);
}
.input-group {
    text-align: left;
    margin-bottom: 20px;
}
.input-group label {
    display: block;
    font-weight: 800;
    font-size: 13px;
    margin-bottom: 8px;
    color: var(--text-dark);
}
.input-group input, .input-group select {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--border-soft);
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
    box-sizing: border-box;
    outline: none;
    background-color: white;
}

/* ERROR MESSAGE BOX */
.error-msg {
    color: var(--color-fun);
    font-size: 13px;
    font-weight: 800;
    margin-top: 8px;
    display: none;
    padding: 8px 12px;
    background: rgba(255, 118, 117, 0.1);
    border-radius: 8px;
    border-left: 3px solid var(--color-fun);
}

.submit-btn {
    width: 100%;
    background: var(--btn-primary);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 10px;
}

/* MAIN HOME DASHBOARD CONTAINER */
.game-hub {
    display: none;
    width: 100%;
    max-width: 1000px;
    padding: 20px;
    box-sizing: border-box;
}
.hub-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #ffffff;
    padding: 15px 30px;
    border-radius: 20px;
}
.hub-logo {
    font-size: 26px;
    font-weight: 900;
    color: var(--btn-primary);
}
.hub-user-badge {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-play);
    padding: 6px 16px;
    border-radius: 50px;
    font-weight: 700;
}
.logout-btn {
    background: none;
    border: none;
    color: var(--color-fun);
    font-weight: 700;
    cursor: pointer;
    font-size: 12px;
    margin-left: 10px;
}

.hub-main {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
    margin-top: 25px;
}
.fun-card {
    background: #ffffff;
    border-radius: 20px;
    padding: 25px;
    position: relative;
    overflow: hidden;
}
.fun-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: var(--color-happy);
}
.fun-card.safe::before { background: var(--color-safe); }
.fun-card.chat::before { background: #0984e3; }

.card-title {
    font-size: 22px;
    font-weight: 900;
    margin: 0 0 10px 0;
}
.card-text {
    color: var(--text-cool);
    font-size: 14px;
    line-height: 1.6;
}

/* LOBBY CHATBOX */
.chat-container {
    border: 2px solid var(--border-soft);
    border-radius: 12px;
    padding: 10px;
    background: var(--bg-play);
    margin-bottom: 10px;
    height: 100px;
    overflow-y: auto;
    font-size: 13px;
    text-align: left;
}
.chat-input-wrapper {
    display: flex;
    gap: 8px;
}
.chat-input-wrapper input {
    flex: 1;
    padding: 10px;
    border: 2px solid var(--border-soft);
    border-radius: 8px;
    outline: none;
}
.chat-send-btn {
    background: var(--btn-primary);
    color: white;
    border: none;
    padding: 0 15px;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
}
.chat-disabled-box {
    background: #ffeaa7;
    color: #d63031;
    padding: 12px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 13px;
    text-align: center;
    border: 1px solid #ff7675;
}
</style> 
</head> 
<body>

<!-- ================= ENTRY GATEWAY ================= -->
<div class="auth-wrapper" id="authGate">
    <div class="auth-title">Blocktor</div>
    <div class="auth-subtitle" id="authSubtitle">Welcome back, builder! Ready to explore?</div>

    <!-- Triple Checked Tab Buttons: Changes styles and headers instantly -->
    <div class="auth-tabs">
        <button class="auth-tab-btn active" id="tabLogin" type="button" onclick="document.getElementById('tabLogin').className='auth-tab-btn active'; document.getElementById('tabSignup').className='auth-tab-btn'; document.getElementById('submitActionBtn').innerText='Let\'s Play'; document.getElementById('authSubtitle').innerText='Welcome back, builder! Ready to explore?';">Log In</button>
        <button class="auth-tab-btn" id="tabSignup" type="button" onclick="document.getElementById('tabSignup').className='auth-tab-btn active'; document.getElementById('tabLogin').className='auth-tab-btn'; document.getElementById('submitActionBtn').innerText='Create My Account'; document.getElementById('authSubtitle').innerText='Claim your user name and play safely!';">Sign Up</button>
    </div>

    <!-- Instant Offensive Text Filter Box -->
    <div class="input-group">
        <label for="usernameInput">Player Name</label>
        <input type="text" id="usernameInput" placeholder="Enter your player name..." oninput="var bad=['nword','idiot','jerk','ass','bitch','fuck']; var contains=false; for(var i=0; i<bad.length; i++){ if(this.value.toLowerCase().includes(bad[i])){ contains=true; } } if(contains){ document.getElementById('profanityError').style.display='block'; document.getElementById('submitActionBtn').disabled=true; document.getElementById('submitActionBtn').style.opacity='0.3'; }else{ document.getElementById('profanityError').style.display='none'; document.getElementById('submitActionBtn').disabled=false; document.getElementById('submitActionBtn').style.opacity='1'; }">
        <div class="error-msg" id="profanityError">Username contains offensive/inappropriate words</div>
    </div>

    <div class="input-group">
        <label for="passwordInput">Password</label>
        <input type="password" id="passwordInput" placeholder="Enter your password...">
    </div>

    <!-- Fully Operational Birth Year Selector Dropdown -->
    <div class="input-group">
        <label for="birthYearInput">Birth Year</label>
        <select id="birthYearInput">
            <option value="2005">2005</option>
            <option value="2008">2008</option>
            <option value="2010">2010</option>
            <option value="2012" selected>2012</option>
            <option value="2015">2015</option>
            <option value="2018">2018</option>
            <option value="2022">2022</option>
        </select>
    </div>

    <!-- Screen Switch Action Button: Processes fields and directly routes screens without background dependencies -->
    <button type="button" class="submit-btn" id="submitActionBtn" onclick="var u=document.getElementById('usernameInput').value.trim(); var p=document.getElementById('passwordInput').value; var y=parseInt(document.getElementById('birthYearInput').value); if(!u || !p){ alert('Please enter a name and password!'); return; } document.getElementById('authGate').style.display='none'; document.getElementById('gameHub').style.display='block'; document.getElementById('userProfileName').innerText=u; if(y > 2010){ document.getElementById('chatActiveSection').style.display='none'; document.getElementById('chatBlockedSection').style.display='block'; document.getElementById('ageStatusLabel').innerHTML='<strong>Child Account Active</strong><br>Features locked: Server Chatting'; document.getElementById('ageStatusLabel').style.color='#d63031'; } else { document.getElementById('chatActiveSection').style.display='block'; document.getElementById('chatBlockedSection').style.display='none'; document.getElementById('ageStatusLabel').innerHTML='<strong>Standard Account Active</strong><br>Chatting enabled.'; document.getElementById('ageStatusLabel').style.color='#2ecc71'; }">Let's Play</button>
</div>

<!-- ================= MAIN HOME DASHBOARD ================= -->
<div class="game-hub" id="gameHub">
    <header class="hub-header">
        <div class="hub-logo">Blocktor</div>
        <div class="hub-user-badge">
            <span id="userProfileName">Player</span>
            <button class="logout-btn" type="button" onclick="document.getElementById('gameHub').style.display='none'; document.getElementById('authGate').style.display='block'; document.getElementById('usernameInput').value=''; document.getElementById('passwordInput').value='';">Log Out</button>
        </div>
    </header>

    <main class="hub-main">
        <div style="display: flex; flex-direction: column; gap: 20px;">
