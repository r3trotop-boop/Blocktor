<!doctype html> 
<html lang="en"> 
<head> 
<meta charset="utf-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Blocktor - Create & Play Safely</title> 
<style> 
:root { 
    --bg-play: #f0f7ff; 
    --card-light: #ffffff; 
    --text-dark: #2c3e50; 
    --text-cool: #7f8c8d; 
    --color-fun: #ff7675; 
    --color-happy: #fdcb6e; 
    --color-safe: #2ecc71; 
    --btn-primary: #6c5ce7;
    --btn-hover: #5b4cc4;
    --border-soft: #dfe6e9;
} 
body { 
    margin: 0; 
    padding: 0; 
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; 
    background-color: var(--bg-play); 
    color: var(--text-dark); 
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
} 

/* SYSTEM GATEKEEPER CARD WRAPPER */
.auth-wrapper {
    background: var(--card-light);
    border-radius: 28px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 40px rgba(108, 92, 231, 0.15);
    border: 5px solid #ffffff;
    text-align: center;
    box-sizing: border-box;
    position: relative;
    overflow: hidden;
}

/* ANIMATED MASCOT ART BOX */
.mascot-container {
    width: 70px;
    height: 70px;
    background: var(--color-happy);
    margin: 0 auto 15px auto;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    animation: floatMascot 3s ease-in-out infinite;
    box-shadow: 0 8px 16px rgba(253, 203, 110, 0.4);
}
.mascot-eyes {
    display: flex;
    gap: 12px;
    margin-bottom: 4px;
    transition: transform 0.1s ease;
}
.mascot-eye {
    width: 8px;
    height: 12px;
    background: var(--text-dark);
    border-radius: 50%;
}
.mascot-mouth {
    width: 16px;
    height: 6px;
    border-bottom: 3px solid var(--text-dark);
    border-radius: 0 0 8px 8px;
    transition: all 0.2s ease;
}
/* Mascot emotional reactions */
.mascot-container.shy .mascot-eyes { transform: translateY(4px) scaleY(0.2); }
.mascot-container.shocked .mascot-mouth { height: 10px; background: var(--text-dark); border-radius: 50%; }
.mascot-container.happy-state .mascot-mouth { transform: scale(1.3); }

@keyframes floatMascot {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-6px) rotate(3deg); }
}

.auth-title {
    font-size: 38px;
    font-weight: 900;
    color: var(--btn-primary);
    margin: 0 0 6px 0;
    letter-spacing: -1.5px;
}
.auth-subtitle {
    color: var(--text-cool);
    font-size: 14px;
    margin-bottom: 25px;
    font-weight: 500;
    min-height: 20px;
}
.auth-tabs {
    display: flex;
    background: var(--bg-play);
    padding: 6px;
    border-radius: 14px;
    margin-bottom: 25px;
}
.auth-tab-btn {
    flex: 1;
    background: transparent;
    border: none;
    padding: 12px;
    font-weight: 800;
    cursor: pointer;
    border-radius: 10px;
    color: var(--text-cool);
    font-size: 14px;
    transition: all 0.2s ease;
}
.auth-tab-btn.active {
    background: #ffffff;
    color: var(--btn-primary);
    box-shadow: 0 6px 14px rgba(108, 92, 231, 0.1);
}
.input-group {
    text-align: left;
    margin-bottom: 20px;
}
.input-group label {
    display: block;
    font-weight: 800;
    font-size: 13px;
    margin-bottom: 8px;
    color: var(--text-dark);
    letter-spacing: -0.2px;
}
.input-group input, .input-group select {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--border-soft);
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
    box-sizing: border-box;
    outline: none;
    background-color: white;
    transition: all 0.2s ease;
}
.input-group input:focus, .input-group select:focus {
    border-color: var(--btn-primary);
    box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
}

/* FLAGGED ERROR TEXT */
.error-msg {
    color: var(--color-fun);
    font-size: 13px;
    font-weight: 800;
    margin-top: 8px;
    display: none;
    padding: 8px 12px;
    background: rgba(255, 118, 117, 0.1);
    border-radius: 8px;
    border-left: 3px solid var(--color-fun);
    text-align: left;
}

.submit-btn {
    width: 100%;
    background: var(--btn-primary);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 10px;
    box-shadow: 0 6px 16px rgba(108, 92, 231, 0.3);
    transition: all 0.2s ease;
}
.submit-btn:hover { 
    background: var(--btn-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4);
}
.submit-btn:active {
    transform: translateY(0px);
}
.submit-btn:disabled {
    background: var(--text-cool);
    box-shadow: none;
    transform: none;
    cursor: not-allowed;
}

/* MAIN GAME CONTAINER HUB */
.game-hub {
    display: none;
    width: 100%;
    max-width: 1000px;
    padding: 20px;
    box-sizing: border-box;
}
.hub-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #ffffff;
    padding: 15px 30px;
    border-radius: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.02);
}
.hub-logo {
    font-size: 26px;
    font-weight: 900;
    color: var(--btn-primary);
}
.hub-user-badge {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-play);
    padding: 6px 16px;
    border-radius: 50px;
    font-weight: 700;
}
.logout-btn {
    background: none;
    border: none;
    color: var(--color-fun);
    font-weight: 700;
    cursor: pointer;
    font-size: 12px;
    margin-left: 10px;
}

/* HUB COLUMN STRUCTURES */
.hub-main {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
    margin-top: 25px;
}
.fun-card {
    background: #ffffff;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.02);
    position: relative;
    overflow: hidden;
}
.fun-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: var(--color-happy);
}
.fun-card.safe::before { background: var(--color-safe); }
.fun-card.chat::before { background: #0984e3; }

.card-title {
    font-size: 22px;
    font-weight: 900;
    margin: 0 0 10px 0;
}
.card-text {
    color: var(--text-cool);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 20px;
}

/* LIVE LOBBY CHATROOM */
.chat-container {
    border: 2px solid var(--border-soft);
    border-radius: 12px;
    padding: 10px;
    background: var(--bg-play);
    margin-bottom: 10px;
    height: 100px;
    overflow-y: auto;
    font-size: 13px;
}
.chat-input-wrapper {
    display: flex;
    gap: 8px;
}
.chat-input-wrapper input {
    flex: 1;
    padding: 10px;
    border: 2px solid var(--border-soft);
    border-radius: 8px;
    outline: none;
}
.chat-send-btn {
    background: var(--btn-primary);
    color: white;
    border: none;
    padding: 0 15px;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
}
.chat-disabled-box {
    background: #ffeaa7;
    color: #d63031;
    padding: 12px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 13px;
    text-align: center;
    border: 1px solid #ff7675;
}
</style> 
</head> 
<body>

<!-- ================= VERIFICATION PANEL AREA ================= -->
<div class="auth-wrapper" id="authGate">
    
    <!-- CSS Interactive Block Mascot -->
    <div class="mascot-container" id="blockMascot">
        <div class="mascot-eyes">
            <div class="mascot-eye"></div>
            <div class="mascot-eye"></div>
        </div>
        <div class="mascot-mouth"></div>
    </div>

    <div class="auth-title">Blocktor</div>
    <div class="auth-subtitle" id="authSubtitle">Welcome back, builder! Ready to explore?</div>

    <div class="auth-tabs">
        <button class="auth-tab-btn active" id="tabLogin" type="button">Log In</button>
        <button class="auth-tab-btn" id="tabSignup" type="button">Sign Up</button>
    </div>

    <div class="input-group">
        <label for="usernameInput">Player Name</label>
        <input type="text" id="usernameInput" placeholder="Enter your player name...">
        <div class="error-msg" id="profanityError">Warning: Name contains inappropriate words!</div>
    </div>

    <div class="input-group">
        <label for="passwordInput">Password</label>
        <input type="password" id="passwordInput" placeholder="Enter your secret password...">
    </div>

    <div class="input-group">
        <label for="birthYearInput">Birth Year</label>
        <select id="birthYearInput">
            <!-- Filled via Script -->
        </select>
    </div>

    <button type="button" class="submit-btn" id="submitActionBtn">Let's Play</button>
</div>

<!-- ================= SECURED MAIN PANEL HUB ================= -->
<div class="game-hub" id="gameHub">
    <header class="hub-header">
        <div class="hub-logo">Blocktor</div>
        <div class="hub-user-badge">
            <span id="userProfileName">GuestPlayer</span>
            <button class="logout-btn" type="button" id="logoutBtn">Log Out</button>
        </div>
    </header>

    <main class="hub-main">
        <div style="display: flex; flex-direction: column; gap: 20px;">
            
            <div class="fun-card chat">
                <h2 class="card-title">Community Safe Chat</h2>
                <p class="card-text">Connect and talk safely with other builders online.</p>
                
                <div id="chatActiveSection">
                    <div class="chat-container" id="chatContainer">
                        <div><strong>System:</strong> Welcome to the safe lobby chat room!</div>
                    </div>
                    <div class="chat-input-wrapper">
                        <input type="text" id="chatInputField" placeholder="Type a friendly message...">
                        <button class="chat-send-btn" type="button" id="sendChatBtn">Send</button>
                    </div>
