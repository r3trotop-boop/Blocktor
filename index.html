<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox - Build a New World</title>
<style>
  :root {
    --roblox-blue: #5A82A6;
    --roblox-dark-blue: #1D354D;
    --panel-bg: #EEF2F7;
    --border-blue: #A2B5CD;
    --green-btn: #4EAD3C;
    --green-btn-border: #3A832B;
  }

  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #BCD2EE url('https://archive.org') repeat-x top center;
    color: #000;
    font-size: 12px;
  }

  /* Main Wrapper */
  .site-container {
    width: 900px;
    margin: 0 auto;
    background: white;
    border-left: 2px solid var(--roblox-blue);
    border-right: 2px solid var(--roblox-blue);
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    min-height: 100vh;
  }

  /* Header Branding Banner */
  .header-banner {
    background: linear-gradient(to right, #FFA500, #FFD700);
    height: 95px;
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-bottom: 2px solid #D68A00;
  }

  .logo-placeholder {
    font-family: 'Arial Black', Impact, sans-serif;
    font-size: 46px;
    color: #E22127;
    text-shadow: 3px 3px 0px #fff, -2px -2px 0px #fff, 4px 4px 5px rgba(0,0,0,0.4);
    letter-spacing: -2px;
  }

  .play-now-banner-btn {
    position: absolute;
    right: 20px;
    top: 20px;
    background: var(--green-btn);
    border: 2px solid var(--green-btn-border);
    color: white;
    font-weight: bold;
    font-size: 20px;
    padding: 10px 25px;
    cursor: pointer;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    border-radius: 4px;
  }

  .play-now-banner-btn:hover {
    background: #439634;
  }

  /* Top sub-navigation menu line */
  .top-meta-nav {
    position: absolute;
    top: 5px;
    left: 20px;
    font-size: 11px;
  }
  .top-meta-nav a { color: #000; text-decoration: none; margin-right: 10px;}

  /* Main Vintage Navigation links bar */
  .main-navbar {
    background: var(--roblox-blue);
    padding: 6px 10px;
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--roblox-dark-blue);
  }

  .main-navbar button {
    background: transparent;
    border: none;
    color: white;
    font-weight: bold;
    font-size: 12px;
    cursor: pointer;
    padding: 4px 12px;
  }

  .main-navbar button:hover {
    background: rgba(255,255,255,0.2);
    text-decoration: underline;
  }

  .main-navbar span { color: #BCD2EE; align-self: center; }

  /* 2007 Multi-column Layout Blocks */
  .main-layout {
    display: flex;
    padding: 15px;
    gap: 15px;
  }

  .left-column {
    width: 580px;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .right-column {
    width: 275px;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  /* Structural Panel Blue Header Panels */
  .panel {
    border: 1px solid var(--border-blue);
    background: #FFF;
  }

  .panel-header {
    background: var(--roblox-blue);
    color: white;
    padding: 5px 10px;
    font-weight: bold;
    font-size: 13px;
  }

  .panel-body {
    padding: 12px;
  }

  /* Member Login Subsystem Interface Form styles */
  .login-form-box {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 250px;
  }

  .login-form-box input {
    padding: 3px;
    border: 1px solid #7F9DB9;
    width: 100%;
  }

  .login-actions-row {
    display: flex;
    gap: 10px;
    margin-top: 5px;
  }

  .classic-blue-btn {
    background: linear-gradient(#FFF, #DCDCDC);
    border: 1px solid #777;
    padding: 3px 12px;
    cursor: pointer;
    font-weight: bold;
    font-size: 11px;
  }
  .classic-blue-btn:hover { background: #EAEAEA; }

  /* Interactive Game Center Card Node Grid Elements */
  .games-list-feed, .catalog-items-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .game-row-card {
    display: flex;
    gap: 15px;
    border-bottom: 1px dashed #CCC;
    padding-bottom: 12px;
  }
  .game-row-card:last-child { border-bottom: none; padding-bottom: 0; }

  .game-icon-thumb {
    width: 90px;
    height: 70px;
    background: #DDD;
    border: 1px solid #999;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 11px;
    color: #555;
  }

  .game-info-details h3 {
    margin: 0 0 5px 0;
    color: #002244;
    font-size: 14px;
    cursor: pointer;
  }
  .game-info-details h3:hover { text-decoration: underline; }

  /* Flash Banner Emulator Node View Component */
  .flash-emulated-banner {
    background: #F0F4F8;
    border: 1px solid #A2B5CD;
    padding: 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .flash-emulated-banner .cta-text h2 { margin: 0; color: #D62222; font-size: 18px; }

  /* Profile Dashboard Subview Section States */
  .user-logged-panel {
    display: flex;
    gap: 15px;
    align-items: center;
  }

  .avatar-render-2d {
    width: 100px;
    height: 120px;
    background: #EAEAEA;
    border: 1px solid #AAA;
    position: relative;
  }

  .part {
    position: absolute;
    border: 1px solid #333;
    background: #F3CA30;
  }
  .p-head { width: 26px; height: 26px; border-radius: 50%; top: 10px; left: 37px; }
  .p-torso { width: 40px; height: 40px; top: 38px; left: 30px; background: #002244; }
  .p-larm { width: 14px; height: 38px; top: 38px; left: 14px; }
  .p-rarm { width: 14px; height: 38px; top: 38px; left: 72px; }
  .p-lleg { width: 18px; height: 40px; top: 80px; left: 31px; background: #226622; }
  .p-rleg { width: 18px; height: 40px; top: 80px; left: 51px; background: #226622; }

  /* App Views Page Container Flags Toggle blocks */
  .app-page-view { display: none; }
  .app-page-view.active-view { display: block; }

  /* Catalog Shop View Structure */
  .catalog-item-box {
    display: inline-block;
    width: 120px;
    border: 1px solid #DDD;
    padding: 10px;
    text-align: center;
    margin-right: 10px;
    background: #F9F9F9;
  }
</style>
</head>
<body>

<div class="site-container">

  <!-- Header Banner -->
  <div class="header-banner">
    <div class="top-meta-nav">
      <a href="#" onclick="showSection('home')">Login</a> | <a href="#">Register</a> | <a href="#">Help</a>
    </div>
    <div class="logo-placeholder">ROBLOX</div>
    <button class="play-now-banner-btn" onclick="showSection('games')">PLAY NOW</button>
  </div>

  <!-- Classic Main Link Bar -->
  <div class="main-navbar">
    <button onclick="showSection('home')">My ROBLOX</button>
    <span>|</span>
    <button onclick="showSection('games')">Games</button>
    <span>|</span>
    <button onclick="showSection('catalog')">Catalog</button>
    <span>|</span>
    <button onclick="alert('Forum functional database coming soon!')">Forum</button>
    <span>|</span>
    <button onclick="showSection('statistics')">Roblox Stats</button>
  </div>

  <!-- Main View Frame -->
  <div class="main-layout">
    
    <!-- Left Column Dynamic Pane -->
    <div class="left-column">
      
      <!-- SUBPAGE SECTION 1: HOME PANEL -->
      <div id="view-home" class="app-page-view active-view">
        
        <!-- Authentication Panel Container Block Toggle -->
        <div class="panel" id="auth-panel-wrapper" style="margin-bottom:15px;">
          <div class="panel-header">Member Login</div>
          <div class="panel-body">
            <div class="login-form-box" id="login-form-fields">
              <div>
                <label style="display:block; font-weight:bold; margin-bottom:2px;">Username:</label>
                <input type="text" id="usernameInput" value="Player1">
              </div>
              <div>
                <label style="display:block; font-weight:bold; margin-bottom:2px;">Password:</label>
                <input type="password" value="******">
              </div>
              <div class="login-actions-row">
                <button class="classic-blue-btn" onclick="executeLogin()">Login</button>
                <button class="classic-blue-btn">Register</button>
              </div>
            </div>

            <!-- Dynamic Session Dashboard View Node -->
            <div id="user-profile-dashboard" class="user-logged-panel" style="display:none;">
              <div class="avatar-render-2d">
                <div class="part p-head"></div>
                <div class="part p-torso" id="char-torso"></div>
                <div class="part p-larm"></div>
                <div class="part p-rarm"></div>
                <div class="part p-lleg"></div>
                <div class="part p-rleg"></div>
              </div>
              <div>
                <h2 style="margin:0 0 5px 0;" id="welcome-user-lbl">Welcome, Explorer!</h2>
                <p><strong>Tickets:</strong> <span id="tix-val">10</span> Tix</p>
                <p><strong>Robux:</strong> <span id="rbx-val">0</span> R$</p>
                <button class="classic-blue-btn" onclick="executeLogout()">Logout</button>
              </div>
            </div>

          </div>
        </div>

        <!-- Classic Ad/Promo Banner Component -->
        <div class="flash-emulated-banner">
          <div class="cta-text">
            <h2>The FREE online building game.</h2>
            <p style="margin:5px 0 0 0; color:#555;">Design your own worlds, battle with swords, and trade custom gear assets.</p>
          </div>
          <button class="classic-blue-btn" style="background:#4EAD3C; color:white; padding:8px 15px; border-color:#3A832B;" onclick="showSection('games')">Play Free Game</button>
        </div>
      </div>

      <!-- SUBPAGE SECTION 2: GAMES DISPLAY LIST FEED -->
      <div id="view-games" class="app-page-view">
        <div class="panel">
          <div class="panel-header">Featured Places & Arenas</div>
          <div class="panel-body">
            <div class="games-list-feed">
