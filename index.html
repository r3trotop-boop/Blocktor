<!doctype html> 
<html lang="en"> 
<head> 
<meta charset="utf-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Blocktor - Create & Play Safely</title> 
<style> 
:root { 
    --bg-play: #f0f7ff; 
    --card-light: #ffffff; 
    --text-dark: #2c3e50; 
    --text-cool: #7f8c8d; 
    --color-fun: #ff7675; 
    --color-happy: #fdcb6e; 
    --color-safe: #2ecc71; 
    --btn-primary: #6c5ce7;
    --btn-hover: #5b4cc4;
    --border-soft: #dfe6e9;
} 
body { 
    margin: 0; 
    padding: 20px; 
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; 
    background-color: var(--bg-play); 
    color: var(--text-dark); 
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    box-sizing: border-box;
} 

/* LOGIN WINDOW CONTAINER */
.auth-wrapper {
    background: var(--card-light);
    border-radius: 28px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 40px rgba(108, 92, 231, 0.15);
    border: 5px solid #ffffff;
    text-align: center;
    box-sizing: border-box;
}

.auth-title {
    font-size: 38px;
    font-weight: 900;
    color: var(--btn-primary);
    margin: 0 0 6px 0;
    letter-spacing: -1px;
}
.auth-subtitle {
    color: var(--text-cool);
    font-size: 14px;
    margin-bottom: 25px;
    font-weight: 500;
}
.auth-tabs {
    display: flex;
    background: var(--bg-play);
    padding: 6px;
    border-radius: 14px;
    margin-bottom: 25px;
    gap: 4px;
}
.auth-tab-btn {
    flex: 1;
    background: transparent;
    border: none;
    padding: 12px;
    font-weight: 800;
    cursor: pointer;
    border-radius: 10px;
    color: var(--text-cool);
    font-size: 14px;
}
.auth-tab-btn.active {
    background: #ffffff;
    color: var(--btn-primary);
    box-shadow: 0 6px 14px rgba(108, 92, 231, 0.1);
}
.input-group {
    text-align: left;
    margin-bottom: 20px;
}
.input-group label {
    display: block;
    font-weight: 800;
    font-size: 13px;
    margin-bottom: 8px;
    color: var(--text-dark);
}
.input-group input, .input-group select {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--border-soft);
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
    box-sizing: border-box;
    outline: none;
    background-color: white;
}

/* ERROR MESSAGE BOX */
.error-msg {
    color: var(--color-fun);
    font-size: 13px;
    font-weight: 800;
    margin-top: 8px;
    display: none;
    padding: 8px 12px;
    background: rgba(255, 118, 117, 0.1);
    border-radius: 8px;
    border-left: 3px solid var(--color-fun);
}

.submit-btn {
    width: 100%;
    background: var(--btn-primary);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 10px;
}

/* MAIN HOME DASHBOARD CONTAINER */
.game-hub {
    display: none;
    width: 100%;
    max-width: 1000px;
    box-sizing: border-box;
}
.hub-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #ffffff;
    padding: 15px 30px;
    border-radius: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.02);
}
.hub-logo {
    font-size: 26px;
    font-weight: 900;
    color: var(--btn-primary);
}
.hub-user-badge {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-play);
    padding: 6px 16px;
    border-radius: 50px;
    font-weight: 700;
}
.logout-btn {
    background: none;
    border: none;
    color: var(--color-fun);
    font-weight: 700;
    cursor: pointer;
    font-size: 12px;
    margin-left: 10px;
}

.hub-main {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
    margin-top: 25px;
}

.fun-card {
    background: #ffffff;
    border-radius: 20px;
    padding: 25px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.02);
    box-sizing: border-box;
    margin-bottom: 20px;
}
.fun-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: var(--color-happy);
}
.fun-card.safe::before { background: var(--color-safe); }
.fun-card.chat::before { background: #0984e3; }

.card-title {
    font-size: 22px;
    font-weight: 900;
    margin: 0 0 10px 0;
}
.card-text {
    color: var(--text-cool);
    font-size: 14px;
    line-height: 1.6;
    margin: 0 0 15px 0;
}

/* LOBBY CHATBOX */
.chat-container {
    border: 2px solid var(--border-soft);
    border-radius: 12px;
    padding: 12px;
    background: var(--bg-play);
    margin-bottom: 12px;
    height: 150px;
    overflow-y: auto;
    font-size: 13px;
    text-align: left;
}
.chat-input-wrapper {
    display: flex;
    gap: 8px;
}
.chat-input-wrapper input {
    flex: 1;
    padding: 12px;
    border: 2px solid var(--border-soft);
    border-radius: 10px;
    outline: none;
    font-size: 14px;
}
.chat-send-btn {
    background: var(--btn-primary);
    color: white;
    border: none;
    padding: 0 20px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
}
.chat-disabled-box {
    background: #ffeaa7;
    color: #d63031;
    padding: 14px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 13px;
    text-align: center;
    border: 1px solid #ff7675;
}
</style> 
</head> 
<body>

<!-- System tracking variable to remember state changes -->
<input type="hidden" id="currentAuthMode" value="login">

<div class="auth-wrapper" id="authGate">

    <div class="auth-tabs">

        <div class="error-msg" id="profanityError">Username contains offensive/inappropriate words</div>
    </div>

    <div class="input-group">
        <label for="passwordInput">Password</label>
        <input type="password" id="passwordInput" placeholder="Enter your password...">
    </div>

    <!-- Hidden by default on Log In, displays only for new Sign Up registrations -->
    <div class="input-group" id="birthYearGroup" style="display: none;">
        <label for="birthYearInput">Birth Year</label>
        <select id="birthYearInput">
            <option value="2005">2005</option>
            <option value="2008">2008</option>
            <option value="2010">2010</option>
            <option value="2012" selected>2012</option>
            <option value="2015">2015</option>
            <option value="2018">2018</option>
            <option value="2022">2022</option>
        </select>
    </div>

    <button type="button" class="submit-btn" id="submitActionBtn" onclick="
        if(typeof window.accountsDatabase === 'undefined') { 
            window.accountsDatabase = {
                'testplayer': { pass: '123', year: 2005 },
                'kidbuilder': { pass: 'abc', year: 2015 }
            }; 
        }
        var u=document.getElementById('usernameInput').value.trim(); 
        var p=document.getElementById('passwordInput').value; 
        var mode=document.getElementById('currentAuthMode').value;
        var key=u.toLowerCase();
        var y=2012; 

        if(!u || !p){ alert('Please fill in all fields!'); return; }

        if(mode === 'signup') {
            y = parseInt(document.getElementById('birthYearInput').value);
            if(window.accountsDatabase[key]) {
                alert('That player name is already registered! Please choose a new name.');
                return;
            }
            window.accountsDatabase[key] = { pass: p, year: y };
            alert('Your account has been safely registered! Welcome to Blocktor!');
        } else {
            var lookup = window.accountsDatabase[key];
            if(!lookup || lookup.pass !== p) {
                alert('Account not found or password incorrect! Tap the Sign Up tab if you are new.');
                return;
            }
            y = lookup.year;
        }

        document.getElementById('authGate').style.display='none';
