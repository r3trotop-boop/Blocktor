<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blocktor - Build & Play</title>
<style>
  :root {
    --blocktor-blue: #3E638A;
    --blocktor-dark: #122438;
    --panel-bg: #FFFFFF;
    --border-blue: #85A3C5;
    --green-btn: #41A32F;
    --green-btn-border: #2B6E1F;
    --orange-gradient: linear-gradient(to bottom, #FFAE19, #FF9000);
    --blue-gradient: linear-gradient(to bottom, #5B81A9, #3E638A);
    --btn-gradient: linear-gradient(to bottom, #FFFFFF 0%, #E6E6E6 100%);
    --btn-gradient-hover: linear-gradient(to bottom, #FFFFFF 0%, #D9D9D9 100%);
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #A6C4E8;
    color: #111;
    font-size: 13px;
    line-height: 1.4;
  }

  .site-container {
    width: 960px;
    margin: 20px auto;
    background: white;
    border: 3px solid var(--blocktor-dark);
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    min-height: 90vh;
    border-radius: 6px;
    overflow: hidden;
  }

  /* Header Banner */
  .header-banner {
    background: var(--orange-gradient);
    height: 105px;
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 25px;
    border-bottom: 3px solid #C66A00;
    box-sizing: border-box;
  }

  .logo {
    font-family: 'Arial Black', Impact, sans-serif;
    font-size: 46px;
    color: #D31E1E;
    text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 4px 4px 6px rgba(0,0,0,0.35);
    letter-spacing: -1px;
  }

  .play-now-btn {
    position: absolute;
    right: 25px;
    top: 28px;
    background: linear-gradient(to bottom, #52C43C, #3F962E);
    border: 2px solid var(--green-btn-border);
    color: white;
    font-weight: bold;
    font-size: 18px;
    padding: 10px 26px;
    cursor: pointer;
    border-radius: 5px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 3px 6px rgba(0,0,0,0.2);
    transition: transform 0.1s;
  }
  .play-now-btn:hover { background: linear-gradient(to bottom, #59D641, #47A834); }
  .play-now-btn:active { transform: translateY(1px); box-shadow: inset 0 2px 4px rgba(0,0,0,0.4); }

  /* Navigation Tabs Bar */
  .main-navbar {
    background: var(--blue-gradient);
    padding: 0 15px;
    display: flex;
    gap: 4px;
    border-bottom: 2px solid var(--blocktor-dark);
    box-sizing: border-box;
    height: 38px;
    align-items: center;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
  }

  .main-navbar button {
    background: transparent;
    border: none;
    color: white;
    font-weight: bold;
    font-size: 13px;
    cursor: pointer;
    padding: 8px 16px;
    text-shadow: 1px 1px 1px rgba(0,0,0,0.3);
    transition: background 0.2s;
    border-radius: 3px;
  }

  .main-navbar button:hover {
    background: rgba(255,255,255,0.15);
  }

  .main-navbar span { color: #AEC8E6; font-weight: bold; opacity: 0.6; }

  /* 2-Column Core Layout Panels */
  .main-layout {
    display: flex;
    padding: 20px;
    gap: 20px;
    box-sizing: border-box;
  }

  .left-column {
    width: 610px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .right-column {
    width: 290px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Refined Panels Styling */
  .panel {
    border: 1px solid var(--border-blue);
    background: var(--panel-bg);
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(62,99,138,0.1);
    overflow: hidden;
  }

  .panel-header {
    background: var(--blue-gradient);
    color: white;
    padding: 8px 14px;
    font-weight: bold;
    font-size: 14px;
    letter-spacing: 0.5px;
    text-shadow: 1px 1px 1px rgba(0,0,0,0.2);
    border-bottom: 1px solid var(--blocktor-dark);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .panel-body {
    padding: 16px;
  }

  /* Polished Input Form Buttons */
  .retro-btn {
    background: var(--btn-gradient);
    border: 1px solid #999;
    padding: 6px 16px;
    cursor: pointer;
    font-weight: bold;
    font-size: 12px;
    border-radius: 4px;
    color: #333;
    box-shadow: inset 0 1px 0 #fff, 0 1px 2px rgba(0,0,0,0.1);
  }
  .retro-btn:hover { background: var(--btn-gradient-hover); border-color: #777; color: #111; }
  .retro-btn:active { box-shadow: inset 0 1px 3px rgba(0,0,0,0.15); }

  /* Tab Control Links */
  .auth-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    border-bottom: 2px solid #E1E6EB;
    padding-bottom: 6px;
  }
  .auth-tab-btn {
    background: #EAEAEA;
    border: 1px solid #CCC;
    border-bottom: none;
    padding: 6px 16px;
    cursor: pointer;
    font-size: 12px;
    font-weight: bold;
    border-radius: 4px 4px 0 0;
    color: #666;
    transition: all 0.2s;
  }
  .auth-tab-btn:hover { background: #F2F2F2; color: #333; }
  .auth-tab-btn.active {
    background: var(--blocktor-blue);
    color: white;
    border-color: var(--blocktor-blue);
    margin-bottom: -8px;
    padding-bottom: 8px;
  }

  .auth-subview { display: none; }
  .auth-subview.active { display: block; }

  .auth-field-block {
    margin-bottom: 12px;
  }
  .auth-field-block label {
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
    color: #444;
  }
  .auth-field-block input {
    padding: 8px;
    width: 220px;
    border: 1px solid #A5BCCE;
    border-radius: 4px;
    box-sizing: border-box;
    font-size: 13px;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .auth-field-block input:focus {
    border-color: var(--blocktor-blue);
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.05), 0 0 0 3px rgba(62,99,138,0.2);
  }

  .error-text {
    color: #D31E1E;
    font-weight: bold;
    margin-top: 8px;
    font-size: 12px;
    padding: 6px 10px;
    background: #FCE8E8;
    border-left: 3px solid #D31E1E;
    border-radius: 0 4px 4px 0;
  }

  /* 2D Character Render Canvas Graphics Frame */
  .avatar-container {
    display: flex;
    gap: 24px;
    align-items: center;
    background: linear-gradient(to bottom, #F4F7FA, #EBF1F6);
    padding: 20px;
    border: 1px dashed var(--border-blue);
    border-radius: 4px;
  }

  .avatar-frame {
    width: 120px;
    height: 150px;
    background: #E5E9F0;
    border: 2px solid #85A3C5;
    position: relative;
    border-radius: 4px;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
  }

  .part {
    position: absolute;
    border: 1px solid #111;
    box-sizing: border-box;
  }
  
  .p-head { width: 30px; height: 30px; top: 10px; left: 45px; border-radius: 2px; }
  .p-torso { width: 46px; height: 48px; top: 40px; left: 37px; }
  
  .arm-wrapper { position: absolute; width: 16px; height: 46px; top: 40px; }
  .left-arm-pos { left: 20px; }
  .right-arm-pos { left: 84px; }
  
  .sleeve { width: 16px; height: 14px; border: 1px solid #111; border-bottom: none; top: 0; position: absolute; }
  .bare-arm { width: 16px; height: 32px; border: 1px solid #111; top: 14px; position: absolute; }

  .p-lleg { width: 22px; height: 50px; top: 88px; left: 37px; }
  .p-rleg { width: 22px; height: 50px; top: 88px; left: 61px; }

  /* Subview App States Router Pages */
  .view-section { display: none; }
  .view-section.active-view { display: block; }

  /* Clean Item Display Grid Cards Layout */
  .catalog-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }

  .item-card {
    border: 1px solid #D5E1ED;
    padding: 12px;
    text-align: center;
    background: #FAFAFA;
    border-radius: 4px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .item-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    border-color: var(--border-blue);
  }

  .item-thumb {
    height: 75px;
    background: #EBF1F6;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    border: 1px solid #D1DFEC;
    border-radius: 3px;
  }

  /* Full Screen Overlay Sandbox Loading Box Popup */
  .game-overlay {
    display: none;
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: rgba(18, 36, 56, 0.75);
    backdrop-filter: blur(3px);
    z-index: 9999;
    align-items: center;
    justify-content: center;
  }
  .game-window {
    background: #FFF;
    padding: 24px;
    border: 4px solid var(--blocktor-blue);
    text-align: center;
    width: 420px;
    border-radius: 6px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>

<div class="site-container">

  <!-- Header Branding Banner -->
  <div class="header-banner">
    <div class="logo">BLOCKTOR</div>
    <button class="play-now-btn" onclick="navigateTo('games')">PLAY NOW</button>
  </div>

  <!-- Main Navigation Tabs Header Links -->
  <div class="main-navbar">
    <button onclick="navigateTo('home')">My Blocktor</button>
    <span>|</span>
    <button onclick="navigateTo('games')">Games</button>
    <span>|</span>
    <button onclick="navigateTo('catalog')">Catalog</button>
    <span>|</span>
    <button onclick="navigateTo('stats')">Blocktor Stats</button>
  </div>

  <!-- Main Multi-Column Split Framework Layout -->
  <div class="main-layout">
    
    <!-- LEFT WINDOW VIEWS CHANNELS CONTENT PANE -->
    <div class="left-column">
      
      <!-- SUBPAGE WINDOW 1: LOGIN HOOK HOME FRAME -->
      <div id="page-home" class="view-section active-view">
        <div class="panel">
          <div class="panel-header">Blocktor Gateway Portal System</div>
          <div class="panel-body">
            
            <!-- Dual Registration Subtabs Panels Forms State Controller Wrapper -->
            <div id="auth-panel-controls">
              <div class="auth-tabs">
                <button id="tab-login" class="auth-tab-btn active" onclick="switchAuthTab('login')">Log In</button>
